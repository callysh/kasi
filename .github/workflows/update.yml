name: 사업공고 자동 수집

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 오전 9시 (한국시간)
    - cron: "0 6 * * *"   # 매일 오후 3시 (한국시간)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4
      - run: python scrape_kasa.py
      - name: 변경사항 커밋
        run: |
          git config user.name "kasa-feed-bot"
          git config user.email "actions@github.com"
          git add kasa_feed.json
          git diff --cached --quiet || git commit -m "공고 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
